<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみくじ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-state="home" data-lang="chs">
    <div class="lang-switch">
        <button id="langBtn" class="lang-btn" type="button">
            <span class="current-lang">中文</span>
        </button>
        <div id="langMenu" class="lang-menu">
            <div class="lang-option" data-lang="chs">简体中文</div>
            <div class="lang-option" data-lang="eng">English</div>
        </div>
    </div>

    <div class="bg">
        <div class="title"></div>
        <div class="hr"></div>
        <div class="content">
            <div id="signTextContainer" class="sign-text" style="display: none;">
                <div id="signText"></div>
            </div>
            <div id="cardContainer" class="card" style="display: none;"></div>
            <div id="homeContainer" class="icons"></div>
        </div>

        <div class="buttons">
            <button id="decodeBtn" class="decode" style="display: none;"></button>
            <button id="redrawBtn" class="redraw" style="display: none;"></button>
            <button id="backBtn" class="back" style="display: none;"></button>
            <button id="shareBtn" class="share" style="display: none;"></button>
            <div class="home-buttons">
                <button id="drawDailyBtn" class="draw-Daily"></button>
                <div class="picker-container">
                    <select id="manualPicker" class="draw-manually">
                        <option value="" disabled selected>请选择...</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="footer"></div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
