name: Build Android Release AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
        
    - name: Build web app
      run: npm run build
        
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Sync Capacitor
      run: npx cap sync android
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.jks

    - name: Create keystore.properties
      run: |
        echo "RELEASE_STORE_FILE=my-release-key.jks" > android/keystore.properties
        echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/keystore.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/keystore.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/keystore.properties

    - name: Make gradlew executable
      run: chmod +x android/gradlew
      
    - name: Build Release AAB
      run: |
        cd android
        ./gradlew bundleRelease
        
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: omikuji-release-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30
